<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — ECM Registro</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: #0f172a; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: #fff; border-radius: 16px; box-shadow: 0 8px 40px rgba(0,0,0,0.3); padding: 2.5rem; width: 100%; max-width: 420px; }
    .login-logo { font-size: 2rem; color: #2456a4; }
    .btn-primary { background: #2456a4; border-color: #2456a4; }
    .btn-primary:hover { background: #1a3e7c; border-color: #1a3e7c; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="text-center mb-4">
      <div class="login-logo"><i class="bi bi-building"></i></div>
      <h5 class="fw-bold mt-2 mb-0">ECM Registro</h5>
      <small class="text-muted">Faça login para continuar</small>
    </div>

    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in msgs %}
      <div class="alert alert-{{ cat }} py-2 small">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="/login">
      <div class="mb-3">
        <label class="form-label small fw-semibold">E-mail</label>
        <input type="email" name="email" class="form-control" placeholder="seu@email.com" required autofocus>
      </div>
      <div class="mb-4">
        <label class="form-label small fw-semibold">Senha</label>
        <input type="password" name="senha" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">
        <i class="bi bi-box-arrow-in-right me-1"></i> Entrar
      </button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
