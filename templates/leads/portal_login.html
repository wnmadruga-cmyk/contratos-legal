<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Acesso ao Portal do Processo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', system-ui, sans-serif; }
    .login-card { background: #fff; border-radius: 20px; padding: 2.5rem 2rem; max-width: 400px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,.35); }
    .brand-logo { width: 56px; height: 56px; background: linear-gradient(135deg, #2456a4, #3b82f6); border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; }
    .brand-logo i { font-size: 1.8rem; color: #fff; }
    .code-input { font-size: 2rem; letter-spacing: .75rem; text-align: center; font-weight: 700; border: 2px solid #e2e8f0; border-radius: 12px; padding: .75rem 1rem; width: 100%; }
    .code-input:focus { border-color: #2456a4; outline: none; box-shadow: 0 0 0 3px rgba(36,86,164,.15); }
    .btn-access { background: linear-gradient(135deg, #2456a4, #3b82f6); border: none; border-radius: 12px; padding: .8rem; font-size: 1rem; font-weight: 600; color: #fff; width: 100%; }
    .btn-access:hover { opacity: .9; }
    .footer-note { font-size: .72rem; color: #94a3b8; text-align: center; margin-top: 1.5rem; }
    .error-msg { background: #fef2f2; border: 1px solid #fca5a5; color: #dc2626; border-radius: 10px; padding: .6rem 1rem; font-size: .85rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand-logo"><i class="bi bi-building-check"></i></div>
    <h5 class="text-center fw-bold mb-1" style="color:#1e293b;">Portal de Acompanhamento</h5>
    <p class="text-center text-muted mb-3" style="font-size:.88rem;">
      Insira o código de acesso que recebeu para acompanhar o andamento do seu processo.
    </p>

    {% if error %}
    <div class="error-msg"><i class="bi bi-exclamation-circle me-1"></i>{{ error }}</div>
    {% endif %}

    <form method="post" autocomplete="off">
      <label class="form-label small fw-semibold text-muted mb-1">Código de Acesso</label>
      <input type="text" name="code" class="code-input" maxlength="6" inputmode="numeric"
             placeholder="••••" autofocus autocomplete="one-time-code">
      <div class="mt-3">
        <button type="submit" class="btn-access">
          <i class="bi bi-unlock me-2"></i>Acessar Processo
        </button>
      </div>
    </form>

    <div class="footer-note">
      <i class="bi bi-shield-lock me-1"></i>
      Acesso seguro e exclusivo para acompanhar o seu processo.<br>
      Em caso de dúvidas, entre em contato com nosso escritório.
    </div>
  </div>
</body>
</html>
